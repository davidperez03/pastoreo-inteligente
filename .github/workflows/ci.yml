name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: srp
          POSTGRES_PASSWORD: srp
          POSTGRES_DB: srp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U srp -d srp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://srp:srp@localhost:5432/srp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e "backend[dev]"
      - name: Lint
        run: ruff check backend
      - name: Migrate
        run: cd backend && alembic upgrade head
      - name: Test
        run: cd backend && pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build
